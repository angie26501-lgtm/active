<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>馥芸財富學苑｜全能活動量管理系統</title>
    <style>
        :root {
            --green: #2f5d50;
            --gold: #c9a66b;
            --light-gold: #f4eee1;
            --bg: #f8f6f2;
            --white: #ffffff;
            --gray: #666;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 1. 品牌標題 */
        header {
            text-align: center;
            padding: 20px 0;
        }
        header h1 {
            color: var(--green);
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 2px;
        }
        header p {
            color: var(--gold);
            font-size: 0.9rem;
            margin: 5px 0 0;
        }

        /* 卡片設計 */
        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(47, 93, 80, 0.05);
            border: 1px solid rgba(201, 166, 107, 0.2);
        }

        h2 {
            color: var(--green);
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 15px;
            border-left: 4px solid var(--gold);
            padding-left: 10px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--green);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* 5. 今日總分大字 */
        .score-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--green), #3d7a6a);
            color: white;
            border-radius: 20px;
            margin: 20px 0;
        }
        .score-display .label { font-size: 0.9rem; opacity: 0.9; }
        .score-display .value { font-size: 3.5rem; font-weight: bold; color: var(--gold); }

        /* 6. 按鈕 */
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(90deg, var(--green), var(--gold));
            color: white;
            box-shadow: 0 4px 10px rgba(47, 93, 80, 0.2);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
            font-size: 0.9rem;
            padding: 10px;
        }
        .btn-danger {
            background: #fff;
            border: 1px solid #e74c3c;
            color: #e74c3c;
            font-size: 0.8rem;
            padding: 8px;
        }

        /* 7. 統計儀表板 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: var(--light-gold);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card .stat-label { font-size: 0.75rem; color: var(--green); }
        .stat-card .stat-value { font-size: 1.2rem; font-weight: bold; color: #333; display: block; margin-top: 5px;}
        .full-width { grid-column: span 2; }

        /* 8. 最近紀錄表 */
        .history-list {
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .history-item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .history-item:last-child { border: none; }
        .history-meta { color: #888; font-size: 0.75rem; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>馥芸財富學苑</h1>
        <p>全能活動量管理系統</p>
    </header>

    <form id="activeForm">
        <div class="card">
            <h2>1. 基本資料</h2>
            <div class="grid">
                <div><label>日期</label><input type="date" id="date" required></div>
                <div><label>姓名</label><input type="text" id="name" placeholder="顧問姓名" required></div>
            </div>
            <label>紀錄模式</label>
            <select id="mode">
                <option value="客戶紀錄">客戶紀錄 (含流程推進)</option>
                <option value="日活動量">日活動量 (純數據回報)</option>
            </select>
        </div>

        <div class="card">
            <h2>2. 財顧流程紀錄</h2>
            <label>客戶姓名</label>
            <input type="text" id="clientName" placeholder="輸入客戶姓名">
            <label>財顧階段 (自動換算活動量)</label>
            <select id="stage" onchange="autoSyncStage()">
                <option value="">-- 請選擇階段 --</option>
                <option value="C1 初步接觸">C1 初步接觸</option>
                <option value="C2 預約諮詢">C2 預約諮詢</option>
                <option value="C3 需求訪談">C3 需求訪談</option>
                <option value="C4 分析診斷">C4 分析診斷</option>
                <option value="C5 建議書說明">C5 建議書說明</option>
                <option value="C6 成交委託">C6 成交委託</option>
                <option value="C7 服務/轉介紹">C7 服務/轉介紹</option>
            </select>
        </div>

        <div class="card">
            <h2>3. 保經活動量數據</h2>
            <div class="grid">
                <div><label
