<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>馥芸財富學苑｜每月拜訪客戶名單</title>
  <style>
    :root {
      --green-dark: #0f3428;
      --green: #1f6b55;
      --green-soft: #e8f3ef;
      --gold: #b58a3a;
      --gold-soft: #f6edda;
      --blue: #2e8fd3;
      --purple: #8a6be8;
      --teal: #23b99a;
      --orange: #e49b21;
      --red: #cc3c31;
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #18342d;
      --muted: #6b7d77;
      --line: #dfe7e3;
      --shadow: 0 12px 28px rgba(20, 45, 36, 0.10);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .page {
      max-width: 1680px;
      margin: 0 auto;
    }

    .hero {
      background:
        radial-gradient(circle at right center, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(135deg, #0b2b22 0%, #153f31 55%, #103126 100%);
      border-radius: 32px;
      padding: 48px 56px;
      color: white;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.86);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--gold);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 4vw, 58px);
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: #fff8e8;
      text-shadow: 0 2px 0 rgba(0,0,0,0.18);
    }

    .hero p {
      margin: 18px 0 0;
      color: rgba(255,255,255,0.78);
      font-size: 18px;
      line-height: 1.8;
    }

    .toolbar {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px 22px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 280px 240px 1fr;
      gap: 18px;
      align-items: end;
      margin-bottom: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      font-size: 14px;
      font-weight: 800;
      color: var(--muted);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfdcd7;
      border-radius: 14px;
      background: white;
      color: var(--text);
      font-size: 16px;
      padding: 12px 14px;
      outline: none;
      font-family: inherit;
      transition: 0.18s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(31,107,85,0.12);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .month-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .month-label {
      min-width: 110px;
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      color: var(--text);
    }

    .icon-btn {
      border: 1px solid #cfdcd7;
      background: white;
      color: var(--green-dark);
      width: 40px;
      height: 40px;
      border-radius: 14px;
      font-size: 20px;
      cursor: pointer;
      transition: 0.18s ease;
      font-weight: 800;
    }

    .icon-btn:hover {
      background: var(--green-soft);
      border-color: var(--green);
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: 0.18s ease;
      white-space: nowrap;
    }

    .btn-outline {
      background: white;
      color: var(--green-dark);
      border: 1px solid #cfdcd7;
    }

    .btn-outline:hover {
      background: var(--green-soft);
      border-color: var(--green);
    }

    .btn-gold {
      background: var(--gold);
      color: white;
      box-shadow: 0 8px 18px rgba(181,138,58,0.24);
    }

    .btn-gold:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(181,138,58,0.30);
    }

    .btn-green {
      background: linear-gradient(135deg, var(--green), #134233);
      color: white;
      box-shadow: 0 8px 18px rgba(31,107,85,0.24);
    }

    .btn-green:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(31,107,85,0.28);
    }

    .btn-red {
      background: var(--red);
      color: white;
      box-shadow: 0 8px 18px rgba(204,60,49,0.20);
    }

    .btn-red:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.62;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px 18px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      min-height: 112px;
    }

    .stat-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--green);
    }

    .stat-card.blue::before { background: var(--blue); }
    .stat-card.purple::before { background: var(--purple); }
    .stat-card.teal::before { background: var(--teal); }
    .stat-card.gold::before { background: var(--gold); }
    .stat-card.orange::before { background: var(--orange); }

    .stat-title {
      font-size: 14px;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-number {
      font-size: 32px;
      line-height: 1.1;
      font-weight: 950;
      color: var(--green-dark);
    }

    .stat-unit {
      color: var(--muted);
      margin-top: 4px;
      font-size: 14px;
    }

    .panel {
      background: white;
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 950;
      color: var(--green-dark);
    }

    .panel-title::before {
      content: "";
      width: 5px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(var(--green), var(--gold));
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1420px;
      border-collapse: collapse;
    }

    th {
      background: #f7f5f1;
      color: var(--muted);
      font-size: 14px;
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      font-weight: 900;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    tbody tr:hover {
      background: #fbfdfc;
    }

    .row-no {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      border-radius: 8px;
      background: #f4f1e9;
      border: 1px solid #ddd7c8;
      font-weight: 800;
      color: var(--muted);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 14px;
      border-radius: 999px;
      font-weight: 900;
      font-size: 14px;
      white-space: nowrap;
    }

    .pill.client {
      background: #e4f3ff;
      color: #176aa5;
    }

    .pill.referral {
      background: #eee7ff;
      color: #6b4fd3;
    }

    .pill.recruit {
      background: #e2f8f2;
      color: #16866d;
    }

    .mini-input,
    .mini-select {
      border: none;
      background: transparent;
      border-radius: 10px;
      padding: 8px;
      font-size: 15px;
      min-width: 110px;
    }

    .mini-input:focus,
    .mini-select:focus {
      background: white;
      border: 1px solid var(--green);
      box-shadow: 0 0 0 3px rgba(31,107,85,0.10);
    }

    .name-input { min-width: 150px; font-weight: 800; }
    .phone-input { min-width: 130px; }
    .money-input { min-width: 110px; text-align: right; }
    .note-input { min-width: 180px; }

    .focus-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-width: 300px;
    }

    .focus-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #d8d5eb;
      background: #f4f1ff;
      color: #573fc3;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }

    .focus-tag input {
      width: 14px;
      height: 14px;
      padding: 0;
      accent-color: var(--purple);
      display: none;
    }

    .focus-tag.checked {
      color: #0f5d4b;
      background: #e5f7f2;
      border-color: #b7e5d7;
    }

    .focus-tag.orange {
      color: #b05b00;
      background: #fff0d9;
      border-color: #f0c98d;
    }

    .focus-tag.blue {
      color: #11679e;
      background: #e7f4ff;
      border-color: #b6dcf6;
    }

    .delete-btn {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      padding: 0;
      background: white;
      color: #98a39f;
      border: 1px solid #dce5e1;
      font-size: 20px;
      line-height: 1;
    }

    .delete-btn:hover {
      color: var(--red);
      border-color: #efb4ac;
      background: #fff2f0;
    }

    .message {
      display: none;
      margin: 0 22px 18px;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.6;
    }

    .message.success {
      display: block;
      color: #0f5d4b;
      background: #e4f5ee;
      border: 1px solid #b4dfce;
    }

    .message.error {
      display: block;
      color: #9a352b;
      background: #fff0ed;
      border: 1px solid #e9b9af;
    }

    .message.info {
      display: block;
      color: #1d5b7d;
      background: #e9f5fb;
      border: 1px solid #b8dced;
    }

    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 1100px) {
      body {
        padding: 14px;
      }

      .hero {
        padding: 34px 24px;
        border-radius: 24px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .panel-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 640px) {
      .stats {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 34px;
      }

      .hero p {
        font-size: 15px;
      }

      .top-actions button {
        width: 100%;
      }

      .month-control {
        width: 100%;
      }

      .month-label {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="badge">馥芸財富學苑｜活動量管理</div>
      <h1>每月拜訪客戶名單</h1>
      <p>準客戶 × 推薦名單 × 增員名單，三類互通，跟進事項一鍵勾選，預估 FYC／FYP 即時統計。</p>
    </section>

    <section class="toolbar">
      <div class="field">
        <label for="advisorName">顧問姓名</label>
        <input id="advisorName" type="text" placeholder="請輸入顧問姓名" />
      </div>

      <div class="field">
        <label>月份</label>
        <div class="month-control">
          <button class="icon-btn" type="button" id="prevMonth">‹</button>
          <div class="month-label" id="monthLabel">2026/05</div>
          <button class="icon-btn" type="button" id="nextMonth">›</button>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn-outline" type="button" onclick="addRow('準客戶')">＋ 準客戶</button>
        <button class="btn-outline" type="button" onclick="addRow('推薦名單')">＋ 推薦名單</button>
        <button class="btn-outline" type="button" onclick="addRow('增員名單')">＋ 增員名單</button>
        <button class="btn-green" type="button" id="submitGoogleBtn">📤 送出本月名單到 Google 表單</button>
        <button class="btn-gold" type="button" id="exportBtn">⇩ 匯出 CSV</button>
        <button class="btn-red" type="button" id="clearMonthBtn">清除本月</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-title">名單總數</div>
        <div class="stat-number" id="totalCount">0</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-title">準客戶</div>
        <div class="stat-number" id="clientCount">0</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-title">推薦名單</div>
        <div class="stat-number" id="referralCount">0</div>
      </div>
      <div class="stat-card teal">
        <div class="stat-title">增員名單</div>
        <div class="stat-number" id="recruitCount">0</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-title">預估 FYC 合計</div>
        <div class="stat-number" id="fyfCount">0</div>
        <div class="stat-unit">元</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-title">預估 FYP 合計</div>
        <div class="stat-number" id="fypCount">0</div>
        <div class="stat-unit">元</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title">本月名單總覽</div>
        <div class="top-actions">
          <button class="btn-outline" type="button" onclick="addRow('準客戶')">＋ 準客戶</button>
          <button class="btn-outline" type="button" onclick="addRow('推薦名單')">＋ 推薦名單</button>
          <button class="btn-outline" type="button" onclick="addRow('增員名單')">＋ 增員名單</button>
        </div>
      </div>

      <div id="messageBox" class="message"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>名單類型</th>
              <th>姓名／暱稱</th>
              <th>手機</th>
              <th>來源／推薦人</th>
              <th>溫度</th>
              <th>本次跟進重點</th>
              <th>下次追蹤</th>
              <th>預估 FYC</th>
              <th>預估 FYP</th>
              <th>備註說明</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty" style="display:none;">目前尚無名單，請點選「＋ 準客戶／推薦名單／增員名單」開始建立。</div>
    </section>
  </div>

  <script>
    const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLScThv-SXE_ioxat3PhfKiWGn07mYVNn-nYNKok69adHeETNPg/formResponse";

    const FIELD_MAP = {
      month: "entry.331237824",
      advisorName: "entry.2101744704",
      listType: "entry.893080773",
      name: "entry.1540990726",
      phone: "entry.1992956277",
      source: "entry.897595625",
      temperature: "entry.887587433",
      followFocus: "entry.900352890",
      otherFollowup: "entry.643419454",
      nextFollowDate: "entry.1195704808",
      estimatedFYC: "entry.431151994",
      estimatedFYP: "entry.1647989083",
      notes: "entry.298986749"
    };

    const STORAGE_KEY = "fuyun_monthly_visit_records_v2";
    const ADVISOR_KEY = "fuyun_monthly_visit_advisor";
    const focusOptions = ["二次面談", "保單檢視", "資產配置", "規劃建議", "理賠", "保服照會"];

    let currentDate = new Date();
    let records = [];

    const advisorNameEl = document.getElementById("advisorName");
    const monthLabelEl = document.getElementById("monthLabel");
    const listBodyEl = document.getElementById("listBody");
    const emptyStateEl = document.getElementById("emptyState");
    const messageBoxEl = document.getElementById("messageBox");
    const submitGoogleBtn = document.getElementById("submitGoogleBtn");

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function getCurrentMonth() {
      return `${currentDate.getFullYear()}/${pad2(currentDate.getMonth() + 1)}`;
    }

    function normalizeDateForGoogle(dateValue) {
      if (!dateValue) return "";
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateValue)) {
        const [y, m, d] = dateValue.split("-");
        return `${y}/${m}/${d}`;
      }
      return dateValue;
    }

    function formatMoney(n) {
      const value = Number(n || 0);
      return value.toLocaleString("zh-TW");
    }

    function createId() {
      return "r_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function getTypeClass(type) {
      if (type === "推薦名單") return "referral";
      if (type === "增員名單") return "recruit";
      return "client";
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        records = raw ? JSON.parse(raw) : [];
      } catch (e) {
        records = [];
      }

      advisorNameEl.value = localStorage.getItem(ADVISOR_KEY) || "";
      monthLabelEl.textContent = getCurrentMonth();

      if (records.length === 0) {
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("準客戶", true);
        addRow("推薦名單", true);
        addRow("推薦名單", true);
        addRow("推薦名單", true);
        addRow("推薦名單", true);
        addRow("推薦名單", true);
        addRow("推薦名單", true);
        addRow("增員名單", true);
        addRow("增員名單", true);
        addRow("增員名單", true);
        addRow("增員名單", true);
        addRow("增員名單", true);
        addRow("增員名單", true);
        saveData();
      }

      render();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      localStorage.setItem(ADVISOR_KEY, advisorNameEl.value.trim());
    }

    function showMessage(type, text) {
      messageBoxEl.className = "message " + type;
      messageBoxEl.textContent = text;
      messageBoxEl.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function clearMessage() {
      messageBoxEl.className = "message";
      messageBoxEl.textContent = "";
    }

    function getMonthRecords() {
      const month = getCurrentMonth();
      return records.filter(r => r.month === month);
    }

    function addRow(type, silent = false) {
      records.push({
        id: createId(),
        month: getCurrentMonth(),
        listType: type,
        name: "",
        phone: "",
        source: "",
        temperature: "",
        followFocus: [],
        otherFollowup: "",
        nextFollowDate: "",
        estimatedFYC: "",
        estimatedFYP: "",
        notes: ""
      });
      saveData();
      if (!silent) {
        clearMessage();
        render();
      }
    }

    function deleteRow(id) {
      if (!confirm("確定要刪除此筆名單嗎？")) return;
      records = records.filter(r => r.id !== id);
      saveData();
      render();
    }

    function updateRecord(id, field, value) {
      const record = records.find(r => r.id === id);
      if (!record) return;
      record[field] = value;
      saveData();
      renderStatsOnly();
    }

    function toggleFocus(id, value) {
      const record = records.find(r => r.id === id);
      if (!record) return;

      if (!Array.isArray(record.followFocus)) {
        record.followFocus = [];
      }

      if (record.followFocus.includes(value)) {
        record.followFocus = record.followFocus.filter(item => item !== value);
      } else {
        record.followFocus.push(value);
      }

      saveData();
      render();
    }

    function render() {
      monthLabelEl.textContent = getCurrentMonth();
      const monthRecords = getMonthRecords();
      listBodyEl.innerHTML = "";

      if (monthRecords.length === 0) {
        emptyStateEl.style.display = "block";
      } else {
        emptyStateEl.style.display = "none";
      }

      monthRecords.forEach((record, index) => {
        const tr = document.createElement("tr");
        const focusTags = focusOptions.map((option, i) => {
          const checked = Array.isArray(record.followFocus) && record.followFocus.includes(option);
          const extraClass = i === 0 ? "orange" : i === 1 ? "blue" : "";
          return `
            <label class="focus-tag ${extraClass} ${checked ? "checked" : ""}">
              <input type="checkbox" ${checked ? "checked" : ""} onchange="toggleFocus('${record.id}', '${option}')">
              ${option}
            </label>
          `;
        }).join("");

        tr.innerHTML = `
          <td><span class="row-no">${index + 1}</span></td>
          <td><span class="pill ${getTypeClass(record.listType)}">${record.listType}</span></td>
          <td><input class="mini-input name-input" value="${escapeHtml(record.name)}" placeholder="姓名／暱稱" onchange="updateRecord('${record.id}', 'name', this.value)" /></td>
          <td><input class="mini-input phone-input" value="${escapeHtml(record.phone)}" placeholder="手機" onchange="updateRecord('${record.id}', 'phone', this.value)" /></td>
          <td>
            <select class="mini-select" onchange="updateRecord('${record.id}', 'source', this.value)">
              ${selectOptions(["", "自然名單", "轉介紹", "講座名單", "社群名單", "舊客戶", "異業合作", "其他"], record.source)}
            </select>
          </td>
          <td>
            <select class="mini-select" onchange="updateRecord('${record.id}', 'temperature', this.value)">
              ${selectOptions(["", "A級：高意願", "B級：可培養", "C級：需暖化", "D級：暫緩"], record.temperature)}
            </select>
          </td>
          <td>
            <div class="focus-tags">
              ${focusTags}
              <input class="mini-input" value="${escapeHtml(record.otherFollowup)}" placeholder="其他..." onchange="updateRecord('${record.id}', 'otherFollowup', this.value)" />
            </div>
          </td>
          <td><input class="mini-input" type="date" value="${escapeHtml(record.nextFollowDate)}" onchange="updateRecord('${record.id}', 'nextFollowDate', this.value)" /></td>
          <td><input class="mini-input money-input" type="number" value="${escapeHtml(record.estimatedFYC)}" placeholder="0" onchange="updateRecord('${record.id}', 'estimatedFYC', this.value)" /></td>
          <td><input class="mini-input money-input" type="number" value="${escapeHtml(record.estimatedFYP)}" placeholder="0" onchange="updateRecord('${record.id}', 'estimatedFYP', this.value)" /></td>
          <td><input class="mini-input note-input" value="${escapeHtml(record.notes)}" placeholder="備註說明" onchange="updateRecord('${record.id}', 'notes', this.value)" /></td>
          <td><button class="delete-btn" type="button" onclick="deleteRow('${record.id}')">×</button></td>
        `;

        listBodyEl.appendChild(tr);
      });

      renderStatsOnly();
    }

    function renderStatsOnly() {
      const monthRecords = getMonthRecords();
      const total = monthRecords.length;
      const client = monthRecords.filter(r => r.listType === "準客戶").length;
      const referral = monthRecords.filter(r => r.listType === "推薦名單").length;
      const recruit = monthRecords.filter(r => r.listType === "增員名單").length;
      const fyc = monthRecords.reduce((sum, r) => sum + Number(r.estimatedFYC || 0), 0);
      const fyp = monthRecords.reduce((sum, r) => sum + Number(r.estimatedFYP || 0), 0);

      document.getElementById("totalCount").textContent = total;
      document.getElementById("clientCount").textContent = client;
      document.getElementById("referralCount").textContent = referral;
      document.getElementById("recruitCount").textContent = recruit;
      document.getElementById("fyfCount").textContent = formatMoney(fyc);
      document.getElementById("fypCount").textContent = formatMoney(fyp);
    }

    function selectOptions(options, selected) {
      return options.map(option => {
        const label = option || "請選擇";
        return `<option value="${escapeHtml(option)}" ${option === selected ? "selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function validateBeforeSubmit() {
      const advisorName = advisorNameEl.value.trim();
      const monthRecords = getMonthRecords();

      if (!advisorName) {
        showMessage("error", "請先填寫「顧問姓名」。");
        advisorNameEl.focus();
        return false;
      }

      if (monthRecords.length === 0) {
        showMessage("error", "本月名單至少要有一筆，才能送出到 Google 表單。");
        return false;
      }

      const invalidIndex = monthRecords.findIndex(r => !String(r.name || "").trim());
      if (invalidIndex >= 0) {
        showMessage("error", `第 ${invalidIndex + 1} 筆名單的「姓名／暱稱」不可空白。`);
        return false;
      }

      return true;
    }

    function appendIfValue(formData, key, value) {
      if (value !== undefined && value !== null && String(value).trim() !== "") {
        formData.append(key, value);
      }
    }

    async function sendOneRecord(record, advisorName) {
      const formData = new FormData();

      appendIfValue(formData, FIELD_MAP.month, record.month);
      appendIfValue(formData, FIELD_MAP.advisorName, advisorName);
      appendIfValue(formData, FIELD_MAP.listType, record.listType);
      appendIfValue(formData, FIELD_MAP.name, record.name);
      appendIfValue(formData, FIELD_MAP.phone, record.phone);
      appendIfValue(formData, FIELD_MAP.source, record.source);
      appendIfValue(formData, FIELD_MAP.temperature, record.temperature);
      appendIfValue(formData, FIELD_MAP.otherFollowup, record.otherFollowup);
      appendIfValue(formData, FIELD_MAP.nextFollowDate, normalizeDateForGoogle(record.nextFollowDate));
      appendIfValue(formData, FIELD_MAP.estimatedFYC, record.estimatedFYC);
      appendIfValue(formData, FIELD_MAP.estimatedFYP, record.estimatedFYP);
      appendIfValue(formData, FIELD_MAP.notes, record.notes);

      if (Array.isArray(record.followFocus)) {
        record.followFocus.forEach(item => {
          appendIfValue(formData, FIELD_MAP.followFocus, item);
        });
      }

      await fetch(GOOGLE_FORM_ACTION, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });
    }

    async function submitCurrentMonthToGoogleForm() {
      clearMessage();

      if (!validateBeforeSubmit()) return;

      const advisorName = advisorNameEl.value.trim();
      const monthRecords = getMonthRecords();

      const confirmed = confirm(`確定要將 ${getCurrentMonth()} 的 ${monthRecords.length} 筆名單送出到 Google 表單嗎？`);
      if (!confirmed) return;

      submitGoogleBtn.disabled = true;
      submitGoogleBtn.textContent = "送出中...";
      showMessage("info", `送出中，共 ${monthRecords.length} 筆資料，請稍候...`);

      try {
        for (let i = 0; i < monthRecords.length; i++) {
          await sendOneRecord(monthRecords[i], advisorName);
          await new Promise(resolve => setTimeout(resolve, 260));
        }

        showMessage("success", "已成功送出，請至 Google 試算表確認紀錄");
      } catch (error) {
        showMessage("error", "送出失敗，請檢查網路或 Google 表單設定");
      } finally {
        submitGoogleBtn.disabled = false;
        submitGoogleBtn.textContent = "📤 送出本月名單到 Google 表單";
      }
    }

    function exportCSV() {
      const monthRecords = getMonthRecords();
      const advisorName = advisorNameEl.value.trim();
      const header = [
        "月份", "顧問姓名", "名單類型", "姓名／暱稱", "手機", "來源／推薦人", "溫度",
        "本次跟進重點", "其他跟進事項", "下次追蹤日期", "預估FYC", "預估FYP", "備註說明"
      ];

      const rows = monthRecords.map(r => [
        r.month,
        advisorName,
        r.listType,
        r.name,
        r.phone,
        r.source,
        r.temperature,
        Array.isArray(r.followFocus) ? r.followFocus.join("、") : "",
        r.otherFollowup,
        normalizeDateForGoogle(r.nextFollowDate),
        r.estimatedFYC,
        r.estimatedFYP,
        r.notes
      ]);

      const csv = [header, ...rows]
        .map(row => row.map(cell => `"${String(cell ?? "").replaceAll('"', '""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `馥芸每月拜訪名單_${getCurrentMonth().replace("/", "-")}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function clearCurrentMonth() {
      const monthRecords = getMonthRecords();
      if (monthRecords.length === 0) {
        showMessage("error", "本月目前沒有可清除的名單。");
        return;
      }

      if (!confirm(`確定要清除 ${getCurrentMonth()} 的全部名單嗎？此動作無法復原。`)) return;

      const month = getCurrentMonth();
      records = records.filter(r => r.month !== month);
      saveData();
      render();
      showMessage("success", "已清除本月名單。");
    }

    document.getElementById("prevMonth").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      clearMessage();
      render();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      clearMessage();
      render();
    });

    advisorNameEl.addEventListener("change", saveData);
    advisorNameEl.addEventListener("input", () => {
      localStorage.setItem(ADVISOR_KEY, advisorNameEl.value.trim());
    });

    document.getElementById("submitGoogleBtn").addEventListener("click", submitCurrentMonthToGoogleForm);
    document.getElementById("exportBtn").addEventListener("click", exportCSV);
    document.getElementById("clearMonthBtn").addEventListener("click", clearCurrentMonth);

    loadData();
  </script>
</body>
</html>
