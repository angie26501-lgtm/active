<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>馥芸財富學苑｜每月拜訪客戶名單</title>
  <style>
    :root{
      --bg:#f5f3ee;
      --card:#ffffff;
      --text:#17352d;
      --muted:#72827d;
      --line:#dfe5e1;

      --green-900:#0b3329;
      --green-800:#134437;
      --green:#1f6a55;
      --green-soft:#e8f4ef;

      --gold:#b68835;
      --gold-soft:#f5ebd6;

      --blue:#3f8fd3;
      --blue-soft:#e7f2fc;

      --purple:#8d69e7;
      --purple-soft:#f0ebfd;

      --teal:#27b59a;
      --teal-soft:#e6f8f4;

      --orange:#d88a17;
      --orange-soft:#fff0d6;

      --red:#cf4437;
      --shadow:0 8px 24px rgba(15,45,36,.08);
      --radius:22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    }

    .wrap{
      max-width:1600px;
      margin:0 auto;
      padding:22px;
    }

    .hero{
      background:
        radial-gradient(circle at 85% 20%, rgba(255,255,255,.08), transparent 20%),
        linear-gradient(135deg, #072d24 0%, #103b30 55%, #0a2f26 100%);
      color:#fff;
      border-radius:34px;
      padding:34px 42px;
      box-shadow:var(--shadow);
      margin-bottom:26px;
    }

    .hero h1{
      margin:0 0 10px;
      font-size:clamp(36px,4vw,58px);
      line-height:1.1;
      font-weight:900;
      color:#fff7df;
      letter-spacing:.02em;
    }

    .hero p{
      margin:0;
      font-size:16px;
      line-height:1.8;
      color:rgba(255,255,255,.82);
    }

    .toolbar{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:24px;
      margin-bottom:22px;
    }

    .toolbar-grid{
      display:grid;
      grid-template-columns: 260px 240px 1fr;
      gap:20px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .field label{
      font-size:14px;
      font-weight:800;
      color:var(--muted);
    }

    input, select, textarea{
      width:100%;
      border:1px solid #cfd8d3;
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:12px 14px;
      font-size:16px;
      font-family:inherit;
      outline:none;
      transition:.18s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--green);
      box-shadow:0 0 0 4px rgba(31,106,85,.10);
    }

    textarea{
      min-height:90px;
      resize:vertical;
    }

    .month-box{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .icon-btn{
      width:40px;
      height:40px;
      border:none;
      border-radius:14px;
      background:#fff;
      border:1px solid #d3dcd7;
      color:var(--green-900);
      font-size:22px;
      font-weight:900;
      cursor:pointer;
      transition:.18s ease;
    }

    .icon-btn:hover{
      background:var(--green-soft);
      border-color:var(--green);
    }

    .month-label{
      min-width:110px;
      text-align:center;
      font-size:24px;
      font-weight:900;
      color:var(--green-900);
    }

    .actions{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      border-radius:16px;
      padding:12px 18px;
      font-size:16px;
      font-weight:900;
      font-family:inherit;
      cursor:pointer;
      transition:.18s ease;
      white-space:nowrap;
    }

    button:hover{ transform:translateY(-1px); }

    .btn-outline{
      background:#fff;
      color:var(--green-900);
      border:1px solid #d0dad4;
    }
    .btn-outline:hover{
      background:var(--green-soft);
      border-color:var(--green);
    }

    .btn-green{
      background:linear-gradient(135deg,var(--green),#134233);
      color:#fff;
      box-shadow:0 8px 18px rgba(31,106,85,.20);
    }

    .btn-gold{
      background:var(--gold);
      color:#fff;
      box-shadow:0 8px 18px rgba(182,136,53,.22);
    }

    .btn-red{
      background:var(--red);
      color:#fff;
      box-shadow:0 8px 18px rgba(207,68,55,.18);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none !important;
      box-shadow:none !important;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:16px;
      margin-bottom:24px;
    }

    .stat{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px 20px;
      box-shadow:var(--shadow);
      min-height:110px;
      position:relative;
      overflow:hidden;
    }

    .stat::before{
      content:"";
      position:absolute;
      left:0; right:0; top:0;
      height:4px;
      background:var(--green);
    }
    .stat.gold::before{background:var(--gold)}
    .stat.blue::before{background:var(--blue)}
    .stat.purple::before{background:var(--purple)}
    .stat.teal::before{background:var(--teal)}
    .stat.orange::before{background:var(--orange)}

    .stat-title{
      font-size:14px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:8px;
    }

    .stat-value{
      font-size:30px;
      font-weight:900;
      line-height:1.1;
      color:var(--green-900);
    }

    .stat-unit{
      margin-top:4px;
      font-size:14px;
      color:var(--muted);
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .panel-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:18px;
      font-weight:900;
      color:var(--green-900);
    }

    .panel-title::before{
      content:"";
      width:5px;
      height:24px;
      border-radius:999px;
      background:linear-gradient(var(--green), var(--gold));
    }

    .message{
      display:none;
      margin:16px 22px 0;
      padding:14px 16px;
      border-radius:16px;
      font-size:15px;
      font-weight:800;
      line-height:1.7;
    }
    .message.success{
      display:block;
      background:#e5f6ef;
      border:1px solid #b6ddcb;
      color:#0f5a49;
    }
    .message.error{
      display:block;
      background:#fff1ee;
      border:1px solid #edb9b1;
      color:#9b3b30;
    }
    .message.info{
      display:block;
      background:#e9f4fb;
      border:1px solid #b7d9ec;
      color:#1a5f84;
    }

    .table-wrap{
      overflow-x:auto;
      width:100%;
    }

    table{
      width:100%;
      min-width:1450px;
      border-collapse:collapse;
    }

    thead th{
      background:#f7f5f1;
      color:var(--muted);
      font-size:14px;
      font-weight:900;
      text-align:left;
      padding:14px 12px;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
    }

    tbody td{
      padding:12px;
      border-bottom:1px solid var(--line);
      vertical-align:middle;
      background:#fff;
    }

    tbody tr:hover td{
      background:#fcfdfc;
    }

    .row-badge{
      min-width:28px;
      height:28px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#f3f0e8;
      border:1px solid #ddd5c6;
      color:var(--muted);
      border-radius:10px;
      font-size:14px;
      font-weight:900;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:8px 14px;
      font-size:14px;
      font-weight:900;
      white-space:nowrap;
    }

    .pill.client{ background:var(--blue-soft); color:#246b9f; }
    .pill.referral{ background:var(--purple-soft); color:#6d4ecb; }
    .pill.recruit{ background:var(--teal-soft); color:#16846d; }

    .cell-input,
    .cell-select{
      border:none;
      background:transparent;
      border-radius:12px;
      padding:9px 10px;
      font-size:15px;
      color:var(--text);
      min-width:100px;
    }

    .cell-input:focus,
    .cell-select:focus{
      background:#fff;
      border:1px solid var(--green);
      box-shadow:0 0 0 3px rgba(31,106,85,.10);
    }

    .name-input{ min-width:120px; font-weight:900; }
    .phone-input{ min-width:120px; }
    .money-input{ min-width:90px; text-align:right; }
    .notes-input{ min-width:160px; }

    .focus-area{
      min-width:360px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }

    .focus-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:7px 12px;
      font-size:13px;
      font-weight:900;
      border:1px solid #ddd;
      cursor:pointer;
      user-select:none;
      transition:.18s ease;
    }

    .focus-chip.orange{
      background:var(--orange-soft);
      border-color:#efca8d;
      color:#a95e00;
    }

    .focus-chip.blue{
      background:var(--blue-soft);
      border-color:#bfdcf4;
      color:#1c6a9d;
    }

    .focus-chip.green{
      background:var(--teal-soft);
      border-color:#bfe9dc;
      color:#187d68;
    }

    .focus-chip.purple{
      background:var(--purple-soft);
      border-color:#d7caf7;
      color:#6546c2;
    }

    .focus-chip.red{
      background:#ffe9e5;
      border-color:#f1c3bc;
      color:#b24e43;
    }

    .focus-chip.violet{
      background:#efe7ff;
      border-color:#d8caf8;
      color:#7755d5;
    }

    .focus-chip.off{
      opacity:.55;
      filter:grayscale(.2);
    }

    .delete-btn{
      width:34px;
      height:34px;
      padding:0;
      border-radius:12px;
      background:#fff;
      border:1px solid #d9e3de;
      color:#9aa7a2;
      font-size:22px;
      line-height:1;
    }
    .delete-btn:hover{
      background:#fff2f0;
      border-color:#ebb7ae;
      color:var(--red);
    }

    .empty{
      padding:42px 18px;
      text-align:center;
      color:var(--muted);
      font-weight:800;
    }

    @media (max-width:1200px){
      .toolbar-grid{ grid-template-columns:1fr; }
      .actions{ justify-content:flex-start; }
      .stats{ grid-template-columns:repeat(2,1fr); }
    }

    @media (max-width:720px){
      .wrap{ padding:14px; }
      .hero{ padding:26px 20px; border-radius:24px; }
      .hero h1{ font-size:36px; }
      .stats{ grid-template-columns:1fr; }
      .actions button{ width:100%; }
      .panel-head{ align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>每月拜訪客戶名單</h1>
      <p>準客戶 × 推薦名單 × 增員名單，三類互通，跟進事項一鍵勾選，預估 FYC／FYP 即時統計。</p>
    </section>

    <section class="toolbar">
      <div class="toolbar-grid">
        <div class="field">
          <label for="advisorName">顧問姓名</label>
          <input id="advisorName" type="text" placeholder="請輸入顧問姓名" />
        </div>

        <div class="field">
          <label>月份</label>
          <div class="month-box">
            <button class="icon-btn" type="button" id="prevMonth">‹</button>
            <div class="month-label" id="monthLabel">2026/05</div>
            <button class="icon-btn" type="button" id="nextMonth">›</button>
          </div>
        </div>

        <div class="actions">
          <button class="btn-outline" type="button" onclick="addRow('準客戶')">＋ 準客戶</button>
          <button class="btn-outline" type="button" onclick="addRow('推薦名單')">＋ 推薦名單</button>
          <button class="btn-outline" type="button" onclick="addRow('增員名單')">＋ 增員名單</button>
          <button class="btn-green" type="button" id="submitGoogleBtn">📤 送出 Google 表單</button>
          <button class="btn-gold" type="button" id="exportBtn">⇩ 匯出 CSV</button>
          <button class="btn-red" type="button" id="clearMonthBtn">清除本月</button>
        </div>
      </div>
    </section>

    <section class="stats">
      <div class="stat gold">
        <div class="stat-title">名單總數</div>
        <div class="stat-value" id="totalCount">0</div>
      </div>
      <div class="stat blue">
        <div class="stat-title">準客戶</div>
        <div class="stat-value" id="clientCount">0</div>
      </div>
      <div class="stat purple">
        <div class="stat-title">推薦名單</div>
        <div class="stat-value" id="referralCount">0</div>
      </div>
      <div class="stat teal">
        <div class="stat-title">增員名單</div>
        <div class="stat-value" id="recruitCount">0</div>
      </div>
      <div class="stat gold">
        <div class="stat-title">預估 FYC 合計</div>
        <div class="stat-value" id="fycTotal">0</div>
        <div class="stat-unit">元</div>
      </div>
      <div class="stat orange">
        <div class="stat-title">預估 FYP 合計</div>
        <div class="stat-value" id="fypTotal">0</div>
        <div class="stat-unit">元</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">本月名單總覽</div>
        <div class="actions" style="justify-content:flex-end">
          <button class="btn-outline" type="button" onclick="addRow('準客戶')">＋ 準客戶</button>
          <button class="btn-outline" type="button" onclick="addRow('推薦名單')">＋ 推薦名單</button>
          <button class="btn-outline" type="button" onclick="addRow('增員名單')">＋ 增員名單</button>
        </div>
      </div>

      <div id="messageBox" class="message"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>名單類型</th>
              <th>姓名／暱稱</th>
              <th>手機</th>
              <th>來源／推薦人</th>
              <th>溫度</th>
              <th>本次跟進重點</th>
              <th>下次追蹤</th>
              <th>預估 FYC</th>
              <th>預估 FYP</th>
              <th>備註說明</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty">目前尚無記錄，請點選上方「＋ 準客戶／推薦名單／增員名單」新增資料。</div>
    </section>
  </div>

  <script>
    const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLScThv-SXE_ioxat3PhfKiWGn07mYVNn-nYNKok69adHeETNPg/formResponse";

    const FIELD_MAP = {
      month: "entry.331237824",
      advisorName: "entry.2101744704",
      listType: "entry.893080773",
      name: "entry.1540990726",
      phone: "entry.1992956277",
      source: "entry.897595625",
      temperature: "entry.887587433",
      followFocus: "entry.900352890",
      otherFollowup: "entry.643419454",
      nextFollowDate: "entry.1195704808",
      estimatedFYC: "entry.431151994",
      estimatedFYP: "entry.1647989083",
      notes: "entry.298986749"
    };

    const STORAGE_KEY = "fuyun_monthly_visit_records_layout_v3";
    const ADVISOR_KEY = "fuyun_monthly_visit_advisor_v3";

    const FOCUS_OPTIONS = [
      { label: "二次面談", cls: "orange" },
      { label: "保單檢視", cls: "blue" },
      { label: "資產配置", cls: "green" },
      { label: "規劃建議", cls: "purple" },
      { label: "理賠", cls: "red" },
      { label: "保服照會", cls: "violet" }
    ];

    let currentDate = new Date();
    let records = [];

    const advisorNameEl = document.getElementById("advisorName");
    const monthLabelEl = document.getElementById("monthLabel");
    const listBodyEl = document.getElementById("listBody");
    const emptyStateEl = document.getElementById("emptyState");
    const messageBoxEl = document.getElementById("messageBox");
    const submitGoogleBtn = document.getElementById("submitGoogleBtn");

    function pad2(n){
      return String(n).padStart(2, "0");
    }

    function getCurrentMonthText(){
      return `${currentDate.getFullYear()}/${pad2(currentDate.getMonth() + 1)}`;
    }

    function createId(){
      return "r_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function formatMoney(v){
      return Number(v || 0).toLocaleString("zh-TW");
    }

    function normalizeDate(dateStr){
      if(!dateStr) return "";
      if(/^\d{4}-\d{2}-\d{2}$/.test(dateStr)){
        const [y,m,d] = dateStr.split("-");
        return `${y}/${m}/${d}`;
      }
      return dateStr;
    }

    function getTypeClass(type){
      if(type === "推薦名單") return "referral";
      if(type === "增員名單") return "recruit";
      return "client";
    }

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showMessage(type, text){
      messageBoxEl.className = "message " + type;
      messageBoxEl.textContent = text;
    }

    function clearMessage(){
      messageBoxEl.className = "message";
      messageBoxEl.textContent = "";
    }

    function loadData(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        records = raw ? JSON.parse(raw) : [];
      }catch(e){
        records = [];
      }

      advisorNameEl.value = localStorage.getItem(ADVISOR_KEY) || "";
      monthLabelEl.textContent = getCurrentMonthText();
      render();
    }

    function saveData(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      localStorage.setItem(ADVISOR_KEY, advisorNameEl.value.trim());
    }

    function getCurrentMonthRecords(){
      const month = getCurrentMonthText();
      return records.filter(r => r.month === month);
    }

    function addRow(type){
      records.push({
        id: createId(),
        month: getCurrentMonthText(),
        listType: type,
        name: "",
        phone: "",
        source: "",
        temperature: "",
        followFocus: [],
        otherFollowup: "",
        nextFollowDate: "",
        estimatedFYC: "",
        estimatedFYP: "",
        notes: ""
      });
      saveData();
      clearMessage();
      render();
    }

    function deleteRow(id){
      if(!confirm("確定要刪除此筆記錄嗎？")) return;
      records = records.filter(r => r.id !== id);
      saveData();
      render();
    }

    function updateRecord(id, field, value){
      const target = records.find(r => r.id === id);
      if(!target) return;
      target[field] = value;
      saveData();
      renderStats();
    }

    function toggleFocus(id, label){
      const target = records.find(r => r.id === id);
      if(!target) return;

      if(!Array.isArray(target.followFocus)){
        target.followFocus = [];
      }

      if(target.followFocus.includes(label)){
        target.followFocus = target.followFocus.filter(x => x !== label);
      }else{
        target.followFocus.push(label);
      }

      saveData();
      render();
    }

    function renderStats(){
      const monthRecords = getCurrentMonthRecords();
      document.getElementById("totalCount").textContent = monthRecords.length;
      document.getElementById("clientCount").textContent = monthRecords.filter(r => r.listType === "準客戶").length;
      document.getElementById("referralCount").textContent = monthRecords.filter(r => r.listType === "推薦名單").length;
      document.getElementById("recruitCount").textContent = monthRecords.filter(r => r.listType === "增員名單").length;
      document.getElementById("fycTotal").textContent = formatMoney(monthRecords.reduce((s,r) => s + Number(r.estimatedFYC || 0), 0));
      document.getElementById("fypTotal").textContent = formatMoney(monthRecords.reduce((s,r) => s + Number(r.estimatedFYP || 0), 0));
    }

    function buildSelectOptions(options, selected){
      return options.map(opt => {
        const text = opt || "";
        const label = opt || "";
        const sel = text === selected ? "selected" : "";
        return `<option value="${escapeHtml(text)}" ${sel}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function render(){
      monthLabelEl.textContent = getCurrentMonthText();
      const monthRecords = getCurrentMonthRecords();
      listBodyEl.innerHTML = "";

      if(monthRecords.length === 0){
        emptyStateEl.style.display = "block";
      }else{
        emptyStateEl.style.display = "none";
      }

      monthRecords.forEach((record, index) => {
        const tr = document.createElement("tr");

        const focusHtml = FOCUS_OPTIONS.map(item => {
          const active = Array.isArray(record.followFocus) && record.followFocus.includes(item.label);
          return `
            <span class="focus-chip ${item.cls} ${active ? "" : "off"}" onclick="toggleFocus('${record.id}', '${item.label}')">
              ${item.label}
            </span>
          `;
        }).join("");

        tr.innerHTML = `
          <td><span class="row-badge">${index + 1}</span></td>
          <td><span class="pill ${getTypeClass(record.listType)}">${record.listType}</span></td>
          <td><input class="cell-input name-input" value="${escapeHtml(record.name)}" placeholder="姓名／暱稱" onchange="updateRecord('${record.id}','name',this.value)" /></td>
          <td><input class="cell-input phone-input" value="${escapeHtml(record.phone)}" placeholder="手機" onchange="updateRecord('${record.id}','phone',this.value)" /></td>
          <td>
            <select class="cell-select" onchange="updateRecord('${record.id}','source',this.value)">
              ${buildSelectOptions(["", "自然名單", "轉介紹", "講座名單", "社群名單", "舊客戶", "異業合作", "其他"], record.source)}
            </select>
          </td>
          <td>
            <select class="cell-select" onchange="updateRecord('${record.id}','temperature',this.value)">
              ${buildSelectOptions(["", "A級：高意願", "B級：可培養", "C級：需暖化", "D級：暫緩"], record.temperature)}
            </select>
          </td>
          <td>
            <div class="focus-area">
              ${focusHtml}
            </div>
          </td>
          <td><input class="cell-input" type="date" value="${escapeHtml(record.nextFollowDate)}" onchange="updateRecord('${record.id}','nextFollowDate',this.value)" /></td>
          <td><input class="cell-input money-input" type="number" value="${escapeHtml(record.estimatedFYC)}" placeholder="0" onchange="updateRecord('${record.id}','estimatedFYC',this.value)" /></td>
          <td><input class="cell-input money-input" type="number" value="${escapeHtml(record.estimatedFYP)}" placeholder="0" onchange="updateRecord('${record.id}','estimatedFYP',this.value)" /></td>
          <td><input class="cell-input notes-input" value="${escapeHtml(record.notes)}" placeholder="備註說明" onchange="updateRecord('${record.id}','notes',this.value)" /></td>
          <td><button class="delete-btn" type="button" onclick="deleteRow('${record.id}')">×</button></td>
        `;

        listBodyEl.appendChild(tr);
      });

      renderStats();
    }

    function validateBeforeSubmit(){
      const advisor = advisorNameEl.value.trim();
      const monthRecords = getCurrentMonthRecords();

      if(!advisor){
        showMessage("error", "請先填寫顧問姓名。");
        advisorNameEl.focus();
        return false;
      }

      if(monthRecords.length === 0){
        showMessage("error", "本月至少要有一筆記錄，才能送出 Google 表單。");
        return false;
      }

      const invalidIndex = monthRecords.findIndex(item => !String(item.name || "").trim());
      if(invalidIndex >= 0){
        showMessage("error", `第 ${invalidIndex + 1} 筆記錄的「姓名／暱稱」不可空白。`);
        return false;
      }

      return true;
    }

    function appendIfValue(formData, key, value){
      if(value !== undefined && value !== null && String(value).trim() !== ""){
        formData.append(key, value);
      }
    }

    async function sendOneRecord(record, advisor){
      const formData = new FormData();

      appendIfValue(formData, FIELD_MAP.month, record.month);
      appendIfValue(formData, FIELD_MAP.advisorName, advisor);
      appendIfValue(formData, FIELD_MAP.listType, record.listType);
      appendIfValue(formData, FIELD_MAP.name, record.name);
      appendIfValue(formData, FIELD_MAP.phone, record.phone);
      appendIfValue(formData, FIELD_MAP.source, record.source);
      appendIfValue(formData, FIELD_MAP.temperature, record.temperature);
      appendIfValue(formData, FIELD_MAP.otherFollowup, record.otherFollowup || "");
      appendIfValue(formData, FIELD_MAP.nextFollowDate, normalizeDate(record.nextFollowDate));
      appendIfValue(formData, FIELD_MAP.estimatedFYC, record.estimatedFYC);
      appendIfValue(formData, FIELD_MAP.estimatedFYP, record.estimatedFYP);
      appendIfValue(formData, FIELD_MAP.notes, record.notes);

      if(Array.isArray(record.followFocus)){
        record.followFocus.forEach(item => {
          appendIfValue(formData, FIELD_MAP.followFocus, item);
        });
      }

      await fetch(GOOGLE_FORM_ACTION, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });
    }

    async function submitCurrentMonthToGoogleForm(){
      clearMessage();

      if(!validateBeforeSubmit()) return;

      const advisor = advisorNameEl.value.trim();
      const monthRecords = getCurrentMonthRecords();

      if(!confirm(`確定要送出 ${monthRecords.length} 筆記錄到 Google 表單嗎？`)) return;

      submitGoogleBtn.disabled = true;
      submitGoogleBtn.textContent = "送出中...";
      showMessage("info", `送出中，共 ${monthRecords.length} 筆資料，請稍候...`);

      try{
        for(let i = 0; i < monthRecords.length; i++){
          await sendOneRecord(monthRecords[i], advisor);
          await new Promise(resolve => setTimeout(resolve, 250));
        }
        showMessage("success", "已成功送出，請至 Google 試算表確認紀錄");
      }catch(error){
        showMessage("error", "送出失敗，請檢查網路或 Google 表單設定");
      }finally{
        submitGoogleBtn.disabled = false;
        submitGoogleBtn.textContent = "📤 送出 Google 表單";
      }
    }

    function exportCSV(){
      const monthRecords = getCurrentMonthRecords();
      const advisor = advisorNameEl.value.trim();

      if(monthRecords.length === 0){
        showMessage("error", "本月目前沒有可匯出的資料。");
        return;
      }

      const header = [
        "月份","顧問姓名","名單類型","姓名／暱稱","手機","來源／推薦人","溫度",
        "本次跟進重點","下次追蹤日期","預估FYC","預估FYP","備註說明"
      ];

      const rows = monthRecords.map(r => [
        r.month,
        advisor,
        r.listType,
        r.name,
        r.phone,
        r.source,
        r.temperature,
        Array.isArray(r.followFocus) ? r.followFocus.join("、") : "",
        normalizeDate(r.nextFollowDate),
        r.estimatedFYC,
        r.estimatedFYP,
        r.notes
      ]);

      const csv = [header, ...rows]
        .map(row => row.map(cell => `"${String(cell ?? "").replaceAll('"','""')}"`).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `每月拜訪客戶名單_${getCurrentMonthText().replace("/", "-")}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function clearCurrentMonth(){
      const month = getCurrentMonthText();
      const monthRecords = getCurrentMonthRecords();

      if(monthRecords.length === 0){
        showMessage("error", "本月目前沒有可清除的資料。");
        return;
      }

      if(!confirm(`確定要清除 ${month} 的全部記錄嗎？此動作無法復原。`)) return;

      records = records.filter(r => r.month !== month);
      saveData();
      render();
      showMessage("success", "已清除本月記錄。");
    }

    document.getElementById("prevMonth").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      clearMessage();
      render();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      clearMessage();
      render();
    });

    advisorNameEl.addEventListener("input", () => {
      localStorage.setItem(ADVISOR_KEY, advisorNameEl.value.trim());
    });

    advisorNameEl.addEventListener("change", saveData);
    document.getElementById("submitGoogleBtn").addEventListener("click", submitCurrentMonthToGoogleForm);
    document.getElementById("exportBtn").addEventListener("click", exportCSV);
    document.getElementById("clearMonthBtn").addEventListener("click", clearCurrentMonth);

    loadData();
  </script>
</body>
</html>
