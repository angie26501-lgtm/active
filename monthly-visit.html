日<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>馥芸財富學苑｜每月拜訪客戶名單</title>
  <style>
    :root {
      --green: #315f4b;
      --green-soft: #e8f1ec;
      --green-light: #f4faf6;
      --gold: #c7a45d;
      --gold-soft: #f5ead2;
      --ink: #24342d;
      --muted: #6b7c73;
      --line: #d9e3dd;
      --white: #ffffff;
      --danger: #b95c45;
      --shadow: 0 18px 45px rgba(49, 95, 75, 0.16);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(199,164,93,0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(49,95,75,0.16), transparent 32%),
        linear-gradient(135deg, #f7faf7 0%, #edf4ef 48%, #fbf6ec 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: 24px 14px 42px;
    }

    .page {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, var(--green), #234336);
      color: var(--white);
      border-radius: 28px;
      padding: 34px 28px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(199,164,93,0.25);
      right: -70px;
      top: -80px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      left: -60px;
      bottom: -80px;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.22);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.2;
      letter-spacing: 0.04em;
      font-weight: 800;
    }

    .hero p {
      margin: 14px 0 0;
      color: rgba(255,255,255,0.86);
      line-height: 1.8;
      font-size: 16px;
    }

    .panel {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section-title {
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    .section-title h2 {
      margin: 0;
      font-size: 20px;
      color: var(--green);
      letter-spacing: 0.04em;
    }

    .section-title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    form {
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      color: var(--ink);
      font-size: 15px;
    }

    .required::after {
      content: " *";
      color: var(--danger);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--white);
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 16px;
      color: var(--ink);
      outline: none;
      transition: 0.18s ease;
      font-family: inherit;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(49,95,75,0.12);
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.7;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .check-card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--green-light);
      cursor: pointer;
      min-height: 46px;
      transition: 0.18s ease;
      font-weight: 600;
      color: var(--ink);
    }

    .check-card:hover {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .check-card input {
      width: 18px;
      height: 18px;
      accent-color: var(--green);
      padding: 0;
      border-radius: 4px;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      margin-top: 26px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 13px 22px;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      font-family: inherit;
      transition: 0.18s ease;
    }

    .btn-clear {
      background: #eef3f0;
      color: var(--green);
    }

    .btn-clear:hover {
      background: #e1ebe5;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--green), #244638);
      color: white;
      box-shadow: 0 10px 22px rgba(49,95,75,0.22);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(49,95,75,0.26);
    }

    .btn-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 15px 16px;
      border-radius: 16px;
      line-height: 1.7;
      font-weight: 700;
    }

    .message.success {
      display: block;
      color: #24533e;
      background: #e6f4ed;
      border: 1px solid #b9ddca;
    }

    .message.error {
      display: block;
      color: #8a3e2f;
      background: #fff0eb;
      border: 1px solid #efc3b5;
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-top: 18px;
    }

    .gold-line {
      width: 54px;
      height: 4px;
      background: var(--gold);
      border-radius: 999px;
      margin-top: 14px;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px 10px 28px;
      }

      .hero {
        padding: 28px 20px;
        border-radius: 24px;
      }

      .section-title,
      form {
        padding: 20px 16px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .checks {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column-reverse;
        align-items: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="hero">
      <div class="hero-inner">
        <div class="badge">馥芸財富學苑｜活動量管理</div>
        <h1>每月拜訪客戶名單</h1>
        <div class="gold-line"></div>
        <p>
          準客戶、推薦名單、增員名單，透過每月系統化追蹤，讓每一次拜訪都留下紀錄，也讓下一步更清楚。
        </p>
      </div>
    </header>

    <main class="panel">
      <div class="section-title">
        <h2>名單追蹤紀錄</h2>
        <p>填寫後資料會自動送到 Google 表單回覆試算表，方便後續統計、追蹤與管理。</p>
      </div>

      <form id="visitForm" autocomplete="on">
        <div class="grid">
          <div class="field">
            <label class="required" for="month">月份</label>
            <input id="month" name="month" type="text" placeholder="例如：2026/05" required />
            <div class="hint">系統會自動帶入當前年月，可自行修改。</div>
          </div>

          <div class="field">
            <label class="required" for="advisorName">顧問姓名</label>
            <input id="advisorName" name="advisorName" type="text" placeholder="請輸入顧問姓名" required />
          </div>

          <div class="field">
            <label class="required" for="listType">名單類型</label>
            <select id="listType" name="listType" required>
              <option value="">請選擇</option>
              <option value="準客戶">準客戶</option>
              <option value="推薦名單">推薦名單</option>
              <option value="增員名單">增員名單</option>
            </select>
          </div>

          <div class="field">
            <label class="required" for="clientName">姓名／暱稱</label>
            <input id="clientName" name="clientName" type="text" placeholder="請輸入姓名或暱稱" required />
          </div>

          <div class="field">
            <label for="phone">手機</label>
            <input id="phone" name="phone" type="tel" placeholder="例如：0912-345-678" />
          </div>

          <div class="field">
            <label for="source">來源／推薦人</label>
            <select id="source" name="source">
              <option value="">請選擇</option>
              <option value="自然名單">自然名單</option>
              <option value="轉介紹">轉介紹</option>
              <option value="講座名單">講座名單</option>
              <option value="社群名單">社群名單</option>
              <option value="舊客戶">舊客戶</option>
              <option value="異業合作">異業合作</option>
              <option value="其他">其他</option>
            </select>
          </div>

          <div class="field">
            <label for="temperature">溫度</label>
            <select id="temperature" name="temperature">
              <option value="">請選擇</option>
              <option value="A級：高意願">A級：高意願</option>
              <option value="B級：可培養">B級：可培養</option>
              <option value="C級：需暖化">C級：需暖化</option>
              <option value="D級：暫緩">D級：暫緩</option>
            </select>
          </div>

          <div class="field">
            <label for="nextFollowDate">下次追蹤日期</label>
            <input id="nextFollowDate" name="nextFollowDate" type="date" />
          </div>

          <div class="field full">
            <label>本次跟進重點</label>
            <div class="checks">
              <label class="check-card">
                <input type="checkbox" name="followFocus" value="二次面談" />
                二次面談
              </label>
              <label class="check-card">
                <input type="checkbox" name="followFocus" value="保單檢視" />
                保單檢視
              </label>
              <label class="check-card">
                <input type="checkbox" name="followFocus" value="資產配置" />
                資產配置
              </label>
              <label class="check-card">
                <input type="checkbox" name="followFocus" value="規劃建議" />
                規劃建議
              </label>
              <label class="check-card">
                <input type="checkbox" name="followFocus" value="理賠" />
                理賠
              </label>
              <label class="check-card">
                <input type="checkbox" name="followFocus" value="保服照會" />
                保服照會
              </label>
            </div>
          </div>

          <div class="field full">
            <label for="otherFollowup">其他跟進事項</label>
            <input id="otherFollowup" name="otherFollowup" type="text" placeholder="例如：補資料、約時間、等待回覆、提醒文件等" />
          </div>

          <div class="field">
            <label for="estimatedFYC">預估 FYC</label>
            <input id="estimatedFYC" name="estimatedFYC" type="number" inputmode="numeric" placeholder="例如：18000" />
          </div>

          <div class="field">
            <label for="estimatedFYP">預估 FYP</label>
            <input id="estimatedFYP" name="estimatedFYP" type="number" inputmode="numeric" placeholder="例如：300000" />
          </div>

          <div class="field full">
            <label for="notes">備註說明</label>
            <textarea id="notes" name="notes" placeholder="可記錄家庭背景、保單議題、跟進進度、增員方向、下一步提醒等。"></textarea>
          </div>
        </div>

        <div id="message" class="message"></div>

        <div class="actions">
          <button class="btn-clear" type="button" id="clearBtn">清除表單</button>
          <button class="btn-submit" type="submit" id="submitBtn">送出紀錄</button>
        </div>
      </form>
    </main>

    <div class="footer-note">
      馥芸財富學苑｜讓名單管理變得更清楚，讓每一次跟進都有累積。
    </div>
  </div>

  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

  <script>
    const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLScThv-SXE_ioxat3PhfKiWGn07mYVNn-nYNKok69adHeETNPg/formResponse";

    const FIELD_MAP = {
      month: "entry.331237824",
      advisorName: "entry.2101744704",
      listType: "entry.893080773",
      clientName: "entry.1540990726",
      phone: "entry.1992956277",
      source: "entry.897595625",
      temperature: "entry.887587433",
      followFocus: "entry.900352890",
      otherFollowup: "entry.643419454",
      nextFollowDate: "entry.1195704808",
      estimatedFYC: "entry.431151994",
      estimatedFYP: "entry.1647989083",
      notes: "entry.298986749"
    };

    const form = document.getElementById("visitForm");
    const messageBox = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");
    const clearBtn = document.getElementById("clearBtn");
    const monthInput = document.getElementById("month");

    function getCurrentMonthText() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      return `${year}/${month}`;
    }

    function showMessage(type, text) {
      messageBox.className = "message " + type;
      messageBox.textContent = text;
      messageBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function clearMessage() {
      messageBox.className = "message";
      messageBox.textContent = "";
    }

    function resetForm() {
      form.reset();
      monthInput.value = getCurrentMonthText();
      clearMessage();
    }

    function validateForm() {
      const requiredFields = [
        { id: "month", label: "月份" },
        { id: "advisorName", label: "顧問姓名" },
        { id: "listType", label: "名單類型" },
        { id: "clientName", label: "姓名／暱稱" }
      ];

      for (const field of requiredFields) {
        const el = document.getElementById(field.id);
        if (!el.value.trim()) {
          showMessage("error", `請先填寫「${field.label}」。`);
          el.focus();
          return false;
        }
      }

      return true;
    }

    function appendIfValue(formData, key, value) {
      if (value !== null && value !== undefined && String(value).trim() !== "") {
        formData.append(key, value);
      }
    }

    async function submitToGoogleForm() {
      const formData = new FormData();

      appendIfValue(formData, FIELD_MAP.month, document.getElementById("month").value);
      appendIfValue(formData, FIELD_MAP.advisorName, document.getElementById("advisorName").value);
      appendIfValue(formData, FIELD_MAP.listType, document.getElementById("listType").value);
      appendIfValue(formData, FIELD_MAP.clientName, document.getElementById("clientName").value);
      appendIfValue(formData, FIELD_MAP.phone, document.getElementById("phone").value);
      appendIfValue(formData, FIELD_MAP.source, document.getElementById("source").value);
      appendIfValue(formData, FIELD_MAP.temperature, document.getElementById("temperature").value);
      appendIfValue(formData, FIELD_MAP.otherFollowup, document.getElementById("otherFollowup").value);
      appendIfValue(formData, FIELD_MAP.nextFollowDate, document.getElementById("nextFollowDate").value);
      appendIfValue(formData, FIELD_MAP.estimatedFYC, document.getElementById("estimatedFYC").value);
      appendIfValue(formData, FIELD_MAP.estimatedFYP, document.getElementById("estimatedFYP").value);
      appendIfValue(formData, FIELD_MAP.notes, document.getElementById("notes").value);

      const checkedFocus = document.querySelectorAll('input[name="followFocus"]:checked');
      checkedFocus.forEach(item => {
        formData.append(FIELD_MAP.followFocus, item.value);
      });

      await fetch(GOOGLE_FORM_ACTION, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });
    }

    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      clearMessage();

      if (!validateForm()) return;

      submitBtn.disabled = true;
      submitBtn.textContent = "送出中...";

      try {
        await submitToGoogleForm();
        showMessage("success", "已成功送出，請至 Google 試算表確認紀錄");
        form.reset();
        monthInput.value = getCurrentMonthText();
      } catch (error) {
        showMessage("error", "送出時發生異常，請稍後再試，或直接使用 Google 表單填寫網址。");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "送出紀錄";
      }
    });

    clearBtn.addEventListener("click", function() {
      const confirmed = window.confirm("確定要清除目前表單內容嗎？");
      if (confirmed) {
        resetForm();
      }
    });

    document.addEventListener("DOMContentLoaded", function() {
      monthInput.value = getCurrentMonthText();
    });
  </script>
</body>
</html>
