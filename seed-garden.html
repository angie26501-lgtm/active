function downloadCard(){
  try{
    var svg=document.getElementById('card');var clone=svg.cloneNode(true);
    clone.setAttribute('width','1080');clone.setAttribute('height','1920');
    var xml=new XMLSerializer().serializeToString(clone);
    var url64='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
    var img=new Image();
    img.onload=function(){var c=document.createElement('canvas');c.width=1080;c.height=1920;var ctx=c.getContext('2d');ctx.drawImage(img,0,0,1080,1920);
      try{var u=c.toDataURL('image/png');var a=document.createElement('a');var n=(document.getElementById('name').value||'我').trim();a.href=u;a.download='財富花園_'+n+'.png';document.body.appendChild(a);a.click();a.remove();}catch(e){window.open(url64,'_blank');}};
    img.onerror=function(){alert('若無法下載，請直接截圖儲存喔～');};img.src=url64;
  }catch(e){alert('若無法下載，請直接截圖儲存喔～');}
}
