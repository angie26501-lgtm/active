<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>活動量管理｜馥芸財富學苑</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-emerald-50 to-amber-50 min-h-screen text-gray-800">

<div class="max-w-3xl mx-auto p-6">

  <h1 class="text-3xl font-black text-center mb-4">
    活動量每日回報
  </h1>

  <!-- 🔗 原始表單入口（已幫你加入） -->
  <div class="text-center mb-6">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfIWCo6ywRDfgpm9UUSPjGFA8pe2bB5e1m46r4sSrHQrz5H6A/viewform" 
       target="_blank"
       class="inline-block bg-white border px-5 py-3 rounded-xl shadow font-bold text-emerald-700 hover:bg-gray-50">
       🔗 開啟原始 Google 表單
    </a>
  </div>

  <form id="form" class="bg-white rounded-3xl p-6 shadow space-y-4">

    <input id="date" type="date" class="w-full p-3 rounded-xl border" required>
    <input id="name" type="text" placeholder="姓名" class="w-full p-3 rounded-xl border" required>

    <div class="grid grid-cols-2 gap-3">
      <input id="call" type="number" value="0" class="p-3 rounded-xl border" placeholder="CALL">
      <input id="apo" type="number" value="0" class="p-3 rounded-xl border" placeholder="APO">
      <input id="ff" type="number" value="0" class="p-3 rounded-xl border" placeholder="FF">
      <input id="pd" type="number" value="0" class="p-3 rounded-xl border" placeholder="PD">
      <input id="c" type="number" value="0" class="p-3 rounded-xl border" placeholder="C">
      <input id="s" type="number" value="0" class="p-3 rounded-xl border" placeholder="S">
      <input id="r" type="number" value="0" class="p-3 rounded-xl border" placeholder="R">
      <input id="policy" type="number" value="0" class="p-3 rounded-xl border" placeholder="送保單">
    </div>

    <input id="cases" type="number" value="0" placeholder="成交件數" class="w-full p-3 rounded-xl border">
    <input id="fyc" type="number" value="0" placeholder="FYC" class="w-full p-3 rounded-xl border">
    <input id="fyp" type="number" value="0" placeholder="FYP" class="w-full p-3 rounded-xl border">

    <textarea id="note" placeholder="備註" class="w-full p-3 rounded-xl border"></textarea>

    <button class="w-full bg-emerald-700 text-white p-4 rounded-xl font-bold">
      ☁️ 送出
    </button>

    <div id="msg" class="text-center text-green-600 font-bold hidden">
      ✅ 已送出
    </div>

  </form>

</div>

<script>
const CONFIG = {
  formAction: "https://docs.google.com/forms/d/e/1FAIpQLSfIWCo6ywRDfgpm9UUSPjGFA8pe2bB5e1m46r4sSrHQrz5H6A/formResponse",
  entries: {
    date: "entry.919879348",
    name: "entry.337035848",
    call: "entry.151478796",
    apo: "entry.2016416450",
    ff: "entry.328881420",
    pd: "entry.136604677",
    c: "entry.1402626868",
    s: "entry.1839597626",
    r: "entry.2137473605",
    policy: "entry.286475001",
    cases: "entry.1425354552",
    fyc: "entry.845303929",
    fyp: "entry.1289571681",
    note: "entry.1999587977"
  }
};

const KEY = "activity_draft";

// 👉 自動今天日期
const today = new Date().toISOString().split("T")[0];
if(!document.getElementById("date").value){
  document.getElementById("date").value = today;
}

// 👉 載入暫存
function load(){
  const data = JSON.parse(localStorage.getItem(KEY)||"{}");
  Object.keys(data).forEach(k=>{
    if(document.getElementById(k)){
      document.getElementById(k).value = data[k];
    }
  });
}
load();

// 👉 儲存暫存
document.querySelectorAll("input,textarea").forEach(el=>{
  el.addEventListener("input",()=>{
    const data = {};
    document.querySelectorAll("input,textarea").forEach(i=>{
      data[i.id]=i.value;
    });
    localStorage.setItem(KEY,JSON.stringify(data));
  });
});

// 👉 送出
document.getElementById("form").addEventListener("submit",e=>{
  e.preventDefault();

  const formData = new FormData();

  Object.keys(CONFIG.entries).forEach(key=>{
    const el = document.getElementById(key);
    if(el){
      formData.append(CONFIG.entries[key],el.value);
    }
  });

  fetch(CONFIG.formAction,{
    method:"POST",
    mode:"no-cors",
    body:formData
  });

  localStorage.removeItem(KEY);

  document.getElementById("msg").classList.remove("hidden");

  document.querySelectorAll("input").forEach(el=>{
    if(el.type==="number") el.value=0;
  });

  document.getElementById("note").value="";
});
</script>

</body>
</html>
