<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動量管理系統</title>

<style>
body{
  font-family:Arial;
  padding:20px;
  background:#f7f3e9;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.score{
  font-size:40px;
  font-weight:bold;
}

.green{color:green}
.gold{color:gold}
</style>
</head>

<body>

<div class="card">
  <h2>活動量輸入</h2>

  CALL <input type="number" id="call" value="0">
  APO <input type="number" id="apo" value="0">
  FF <input type="number" id="ff" value="0">
  PD <input type="number" id="pd" value="0">
  成交 <input type="number" id="c_act" value="0">
  服務 <input type="number" id="s_act" value="0">
  轉介紹 <input type="number" id="r_act" value="0">
  保單 <input type="number" id="policy" value="0">

  <button onclick="calculateScore()">計算分數</button>
</div>

<div class="card">
  <h2>分數</h2>
  <div id="scoreValue" class="score">0</div>
  <div id="phaseText"></div>
  <div id="actionAdvice"></div>
</div>

<script>

function calculateScore(){

  const getNum = (id) => {
    return parseInt(document.getElementById(id).value) || 0;
  };

  const score =
    (getNum('call') * 1) +
    (getNum('apo') * 5) +
    (getNum('ff') * 10) +
    (getNum('pd') * 15) +
    (getNum('c_act') * 30) +
    (getNum('s_act') * 5) +
    (getNum('r_act') * 20) +
    (getNum('policy') * 10);

  document.getElementById("scoreValue").innerText = score;

  const phaseText = document.getElementById("phaseText");
  const actionAdvice = document.getElementById("actionAdvice");

  if(score < 30){

    phaseText.innerText = "醞釀期";

    actionAdvice.innerHTML = `
    🔍增加接觸量<br>
    ✔ 補 3 CALL 或 1 APO
    `;

  } else if(score < 80){

    phaseText.innerText = "行動期";

    actionAdvice.innerHTML = `
    🔍推進流程<br>
    ✔ APO → FF
    `;

  } else if(score < 150){

    phaseText.innerText = "轉換期";

    actionAdvice.innerHTML = `
    🔍準備成交<br>
    ✔ 追蹤 PD / Closing
    `;

  } else {

    phaseText.innerText = "豐收期";

    actionAdvice.innerHTML = `
    🔍擴大成果<br>
    ✔ 轉介紹 / 服務延伸
    `;
  }

}

</script>

</body>
</html>
