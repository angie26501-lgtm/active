<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>馥芸財富學苑｜財顧芸｜AI學習專區</title>

  <style>
    :root {
      --herbal-green: #5f7f68;
      --deep-green: #3f5f4d;
      --milk-tea-gold: #c8a66a;
      --soft-gold: #ead8ad;
      --cream: #f8f3e9;
      --light-green-gray: #edf2ec;
      --deep-gray: #2f3430;
      --medium-gray: #6f756d;
      --white: #ffffff;
      --warning-bg: #fff5df;
      --warning-border: #e0b86a;
      --warning-text: #8b5e1f;
      --shadow: 0 18px 45px rgba(47, 52, 48, 0.12);
      --card-shadow: 0 14px 35px rgba(63, 95, 77, 0.13);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
        "Microsoft JhengHei", "PingFang TC", sans-serif;
      color: var(--deep-gray);
      background:
        radial-gradient(circle at top left, rgba(200, 166, 106, 0.22), transparent 32%),
        radial-gradient(circle at bottom right, rgba(95, 127, 104, 0.2), transparent 36%),
        linear-gradient(135deg, var(--cream), var(--light-green-gray));
      line-height: 1.7;
    }

    a {
      text-decoration: none;
    }

    button,
    input {
      font-family: inherit;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .login-page {
      display: flex;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      padding: 42px 34px;
      border-radius: 28px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(248, 243, 233, 0.9));
      box-shadow: var(--shadow);
      border: 1px solid rgba(200, 166, 106, 0.28);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 72%;
      height: 5px;
      background: linear-gradient(90deg, var(--herbal-green), var(--milk-tea-gold));
      border-radius: 0 0 999px 999px;
    }

    .login-card::after {
      content: "";
      position: absolute;
      right: -52px;
      bottom: -52px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(200, 166, 106, 0.14);
      z-index: 0;
    }

    .login-card > * {
      position: relative;
      z-index: 1;
    }

    .brand-mark {
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--deep-green), var(--herbal-green));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--soft-gold);
      font-size: 30px;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(63, 95, 77, 0.24);
    }

    .login-card h1 {
      font-size: 30px;
      line-height: 1.35;
      letter-spacing: 0.06em;
      color: var(--deep-green);
      margin-bottom: 8px;
    }

    .login-card h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--deep-gray);
      margin-bottom: 12px;
    }

    .login-card p {
      font-size: 15px;
      color: var(--medium-gray);
      margin-bottom: 28px;
    }

    .password-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }

    .password-box input {
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      border: 1px solid rgba(95, 127, 104, 0.28);
      background: rgba(255, 255, 255, 0.88);
      font-size: 16px;
      outline: none;
      color: var(--deep-gray);
      transition: 0.25s ease;
    }

    .password-box input:focus {
      border-color: var(--herbal-green);
      box-shadow: 0 0 0 4px rgba(95, 127, 104, 0.12);
    }

    .login-button {
      border: none;
      cursor: pointer;
      padding: 15px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--deep-green), var(--herbal-green));
      color: var(--white);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.08em;
      transition: 0.25s ease;
      box-shadow: 0 12px 26px rgba(63, 95, 77, 0.22);
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(63, 95, 77, 0.28);
    }

    .error-message {
      min-height: 24px;
      color: #b64545;
      font-size: 14px;
      margin-top: 12px;
      font-weight: 700;
    }

    .secure-note {
      margin-top: 22px;
      font-size: 13px;
      color: var(--medium-gray);
    }

    .main-page {
      display: none;
      min-height: 100vh;
      padding: 48px 22px 34px;
    }

    .main-container {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      padding: 44px 24px 36px;
      border-radius: 32px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.86), rgba(248, 243, 233, 0.72));
      border: 1px solid rgba(200, 166, 106, 0.22);
      box-shadow: var(--shadow);
      margin-bottom: 34px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -70px;
      top: -70px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(200, 166, 106, 0.16);
    }

    .hero-badge {
      display: inline-block;
      padding: 7px 16px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: rgba(95, 127, 104, 0.12);
      color: var(--deep-green);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.25;
      color: var(--deep-green);
      letter-spacing: 0.04em;
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .hero .subtitle {
      font-size: 20px;
      color: var(--deep-gray);
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .hero .course-title {
      font-size: 18px;
      color: var(--medium-gray);
      margin-bottom: 12px;
      position: relative;
      z-index: 1;
    }

    .hero .hero-desc {
      max-width: 680px;
      margin: 0 auto;
      color: var(--medium-gray);
      font-size: 15px;
      position: relative;
      z-index: 1;
    }

    .course-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin-bottom: 34px;
    }

    .course-card {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(237, 242, 236, 0.85));
      border-radius: 26px;
      padding: 28px 24px;
      box-shadow: var(--card-shadow);
      border: 1px solid rgba(95, 127, 104, 0.14);
      transition: 0.28s ease;
      position: relative;
      overflow: hidden;
      min-height: 330px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .course-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--herbal-green), var(--milk-tea-gold));
    }

    .course-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 22px 46px rgba(63, 95, 77, 0.2);
    }

    .course-number {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: rgba(200, 166, 106, 0.16);
      color: var(--deep-green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      margin-bottom: 16px;
    }

    .course-card h3 {
      font-size: 20px;
      line-height: 1.45;
      color: var(--deep-green);
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .tag.warning {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      color: var(--warning-text);
    }

    .tag.normal {
      background: rgba(95, 127, 104, 0.12);
      border: 1px solid rgba(95, 127, 104, 0.18);
      color: var(--deep-green);
    }

    .course-card p {
      color: var(--medium-gray);
      font-size: 15px;
      margin-bottom: 22px;
    }

    .warning-note {
      padding: 12px 13px;
      border-radius: 16px;
      background: var(--warning-bg);
      border: 1px solid rgba(224, 184, 106, 0.68);
      color: var(--warning-text);
      font-weight: 600;
    }

    .watch-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 13px 16px;
      border-radius: 15px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--white);
      background: linear-gradient(135deg, var(--deep-green), var(--herbal-green));
      box-shadow: 0 12px 24px rgba(63, 95, 77, 0.2);
      transition: 0.25s ease;
    }

    .watch-button.gold {
      background: linear-gradient(135deg, #b7924f, var(--milk-tea-gold));
      box-shadow: 0 12px 24px rgba(200, 166, 106, 0.22);
    }

    .watch-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .link-section {
      margin: 8px 0 34px;
      padding: 34px 26px;
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(248, 243, 233, 0.78));
      border: 1px solid rgba(200, 166, 106, 0.22);
      box-shadow: var(--shadow);
    }

    .section-header {
      text-align: center;
      margin-bottom: 26px;
    }

    .section-header span {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(200, 166, 106, 0.16);
      color: var(--deep-green);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .section-header h2 {
      font-size: clamp(24px, 4vw, 34px);
      color: var(--deep-green);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .section-header p {
      color: var(--medium-gray);
      font-size: 16px;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .link-card {
      padding: 26px 22px;
      border-radius: 24px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(237, 242, 236, 0.82));
      border: 1px solid rgba(95, 127, 104, 0.14);
      box-shadow: var(--card-shadow);
      transition: 0.28s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 260px;
    }

    .link-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 42px rgba(63, 95, 77, 0.18);
    }

    .link-icon {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--deep-green), var(--herbal-green));
      color: var(--soft-gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      margin-bottom: 18px;
      box-shadow: 0 12px 24px rgba(63, 95, 77, 0.18);
    }

    .link-card h3 {
      font-size: 19px;
      color: var(--deep-green);
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .link-card p {
      color: var(--medium-gray);
      font-size: 15px;
      margin-bottom: 20px;
    }

    .logout-area {
      text-align: center;
      margin: 12px 0 30px;
    }

    .logout-button {
      border: 1px solid rgba(95, 127, 104, 0.28);
      background: rgba(255, 255, 255, 0.58);
      color: var(--deep-green);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .logout-button:hover {
      background: rgba(95, 127, 104, 0.1);
      transform: translateY(-1px);
    }

    footer {
      text-align: center;
      color: var(--medium-gray);
      font-size: 14px;
      padding: 12px 8px 0;
    }

    footer strong {
      color: var(--deep-green);
      font-weight: 800;
    }

    @media (max-width: 860px) {
      .course-grid,
      .link-grid {
        grid-template-columns: 1fr;
      }

      .course-card,
      .link-card {
        min-height: auto;
      }

      .hero {
        padding: 36px 22px 28px;
      }
    }

    @media (max-width: 520px) {
      .page {
        padding: 20px;
      }

      .login-card {
        padding: 36px 24px;
        border-radius: 24px;
      }

      .login-card h1 {
        font-size: 26px;
      }

      .login-card h2 {
        font-size: 18px;
      }

      .main-page {
        padding: 30px 16px 24px;
      }

      .hero {
        border-radius: 26px;
      }

      .course-card,
      .link-card {
        padding: 24px 20px;
        border-radius: 22px;
      }

      .link-section {
        padding: 28px 20px;
        border-radius: 24px;
      }
    }
  </style>
</head>

<body>
  <section id="loginPage" class="page login-page">
    <div class="login-card">
      <div class="brand-mark">芸</div>

      <h1>馥芸財富學苑</h1>
      <h2>財顧芸｜AI學習專區</h2>
      <p>公勝包班｜浩茂AI科技</p>

      <div class="password-box">
        <input
          type="password"
          id="passwordInput"
          placeholder="請輸入課程密碼"
          autocomplete="off"
        />
        <button class="login-button" onclick="checkPassword()">進入學習專區</button>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div class="secure-note">本頁內容僅供課程學員學習使用，請勿外流分享</div>
    </div>
  </section>

  <main id="mainPage" class="main-page">
    <div class="main-container">
      <section class="hero">
        <div class="hero-badge">AI Learning Area</div>
        <h1>馥芸財富學苑｜財顧芸</h1>
        <div class="subtitle">公勝包班（浩茂AI科技）</div>
        <div class="course-title">2026/05/04 NotebookLM 課程連結整理</div>
        <p class="hero-desc">
          本頁整理 2026/05/04 公勝 AI 包班課程學習連結，提供學員課後複習與延伸學習使用。
        </p>
      </section>

      <section class="course-grid">
        <article class="course-card">
          <div>
            <div class="course-number">01</div>
            <h3>20260504 Gemini LLM Gamma 1</h3>
            <div class="tag warning">⚠️ 本段影片無聲音</div>
            <p class="warning-note">
              ⚠️
