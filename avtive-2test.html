<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動量管理系統</title>

<style>
body{
  font-family:sans-serif;
  background:#f4f6f5;
  padding:20px;
}
.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}
h1{color:#1e6b4a}
.card{
  margin-bottom:15px;
  padding:15px;
  background:#fafafa;
  border-radius:10px;
}
input{
  width:100%;
  padding:8px;
  margin-top:5px;
}
button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.primary{background:#1e6b4a;color:#fff}
.save{background:#b8962e;color:#fff}
.clear{background:#999;color:#fff}
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
th,td{
  border-bottom:1px solid #ddd;
  padding:8px;
  text-align:center;
}
</style>
</head>

<body>
<div class="container">

<h1>每日活動量管理</h1>
<p>每日三訪是必然</p>

<!-- 基本資料 -->
<div class="card">
<label>日期</label>
<input type="date" id="date">

<label>姓名</label>
<input type="text" id="name">
</div>

<!-- 活動量 -->
<div class="card">
<h3>六大步驟</h3>

<label>CALL（建立關係）</label>
<input type="number" id="call" value="0" oninput="calc()">

<label>APO（約訪）</label>
<input type="number" id="apo" value="0" oninput="calc()">

<label>FF（面談）</label>
<input type="number" id="ff" value="0" oninput="calc()">

<label>PD（建議書）</label>
<input type="number" id="pd" value="0" oninput="calc()">

<label>C（成交）</label>
<input type="number" id="c" value="0" oninput="calc()">

<label>S（服務）</label>
<input type="number" id="s" value="0" oninput="calc()">

<label>R（轉介紹）</label>
<input type="number" id="r" value="0" oninput="calc()">

<label>送保單</label>
<input type="number" id="policy" value="0" oninput="calc()">
</div>

<!-- 成交 -->
<div class="card">
<h3>成交數據</h3>

<label>FYP（保費）</label>
<input type="number" id="fyp" value="0">

<label>FYC（佣金）</label>
<input type="number" id="fyc" value="0">

<label>成交件數</label>
<input type="number" id="case" value="0">

<label>推薦介紹數</label>
<input type="number" id="intro" value="0">
</div>

<!-- 分數 -->
<div class="card">
<h2>今日活動量分數：<span id="score">0</span></h2>
</div>

<!-- 按鈕 -->
<button class="primary" onclick="save()">儲存今日</button>
<button class="clear" onclick="clearData()">清空</button>

<!-- 紀錄 -->
<table>
<thead>
<tr>
<th>日期</th>
<th>CALL</th>
<th>APO</th>
<th>FF</th>
<th>PD</th>
<th>C</th>
<th>分數</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script>

// ===== 計算分數 =====
function calc(){
  let call = Number(document.getElementById("call").value);
  let apo = Number(document.getElementById("apo").value);
  let ff = Number(document.getElementById("ff").value);
  let pd = Number(document.getElementById("pd").value);
  let c = Number(document.getElementById("c").value);

  let score = call*1 + apo*2 + ff*3 + pd*4 + c*5;

  document.getElementById("score").innerText = score;
}

// ===== 儲存 =====
function save(){
  let data = JSON.parse(localStorage.getItem("activity")||"[]");

  let item = {
    date: document.getElementById("date").value,
    call: document.getElementById("call").value,
    apo: document.getElementById("apo").value,
    ff: document.getElementById("ff").value,
    pd: document.getElementById("pd").value,
    c: document.getElementById("c").value,
    score: document.getElementById("score").innerText
  };

  data.push(item);
  localStorage.setItem("activity", JSON.stringify(data));

  render();
}

// ===== 顯示 =====
function render(){
  let data = JSON.parse(localStorage.getItem("activity")||"[]");
  let html="";

  data.forEach(d=>{
    html+=`
    <tr>
      <td>${d.date}</td>
      <td>${d.call}</td>
      <td>${d.apo}</td>
      <td>${d.ff}</td>
      <td>${d.pd}</td>
      <td>${d.c}</td>
      <td>${d.score}</td>
    </tr>`;
  });

  document.getElementById("list").innerHTML = html;
}

// ===== 清空 =====
function clearData(){
  localStorage.removeItem("activity");
  render();
}

// ===== 啟動 =====
window.onload = render;

</script>

</body>
</html>
