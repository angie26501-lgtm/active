<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動量管理系統</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:white;padding:20px;border-radius:16px;margin-bottom:20px}
h2{margin-top:0}
input{width:100%;padding:10px;margin:5px 0}
button{padding:10px 15px;border:none;border-radius:8px;background:#1f5b43;color:white;font-weight:bold}
.score{font-size:40px;font-weight:bold;text-align:center}
.green{color:#2f7a5a}
.gold{color:#c8a94b}
.gray{color:#aaa}
</style>
</head>

<body>

<div class="card">
<h2>活動量輸入</h2>

CALL <input id="call" type="number" value="0">
APO <input id="apo" type="number" value="0">
FF <input id="ff" type="number" value="0">
PD <input id="pd" type="number" value="0">
C <input id="c" type="number" value="0">
S <input id="s" type="number" value="0">
R <input id="r" type="number" value="0">
POLICY <input id="policy" type="number" value="0">

<button onclick="calculate()">計算分數</button>
</div>

<div class="card">
<h2>今日分數</h2>
<div id="score" class="score gray">0</div>
<div id="status"></div>
</div>

<div class="card">
<h2>分數標準</h2>

0-29：醞釀期（補CALL）<br>
30-79：行動期（推進FF）<br>
80+：豐收期（成交＋轉介紹）

</div>

<div class="card">
<h2>歷史紀錄</h2>
<div id="history"></div>
</div>

<script>

function calculate(){
let score =
call.value*1 +
apo.value*5 +
ff.value*10 +
pd.value*15 +
c.value*30 +
s.value*5 +
r.value*20 +
policy.value*10;

document.getElementById("score").innerText=score;

if(score<30){
score.className="score gray";
status.innerText="醞釀期：補CALL";
}
else if(score<80){
score.className="score green";
status.innerText="行動期：推進FF";
}
else{
score.className="score gold";
status.innerText="豐收期：收單＋轉介紹";
}

save(score);
}

function save(score){
let data=JSON.parse(localStorage.getItem("data")||"[]");

data.unshift({
date:new Date().toLocaleDateString(),
score:score
});

localStorage.setItem("data",JSON.stringify(data));
render();
}

function render(){
let data=JSON.parse(localStorage.getItem("data")||"[]");

history.innerHTML=data.map(d=>
`<div>${d.date}：${d.score}分</div>`
).join("");
}

render();

</script>

</body>
</html>
